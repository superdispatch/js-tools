name: Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          cache-key: cache-v1-
          node-version: 24
          pnpm-version: 10.25

      - run: pnpm tsc
      - run: pnpm lint
      - uses: superdispatch/actions/update-snapshots@v1.6
        with:
          command: pnpm test
          update-command: pnpm test -u
      - uses: codecov/codecov-action@v2
